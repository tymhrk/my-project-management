services:
  db:
    image: postgres:16
    platform: linux/arm64
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    platform: linux/arm64
    env_file:
      - ./.env
    environment:
      - RAILS_ENV=development
    volumes:
      - ./backend:/app
      - /app/tmp/cache
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    platform: linux/arm64
    env_file:
      - ./.env
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"

volumes:
  postgres_data:
